name: Publish

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type used by Modrinth and CurseForge"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - beta
          - alpha
      publish_modrinth:
        description: "Publish to Modrinth"
        required: true
        default: true
        type: boolean
      publish_curseforge:
        description: "Publish to CurseForge"
        required: true
        default: true
        type: boolean
      publish_github_release:
        description: "Create/update a GitHub release with the built jars"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  prepare_release:
    name: Prepare release branch
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_branch: ${{ steps.version.outputs.release_branch }}

    steps:
      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Increment release version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime, timezone
          from pathlib import Path
          import re

          path = Path("gradle.properties")
          text = path.read_text(encoding="utf-8")
          match = re.search(r"^mod_version=(\d+)\.(\d+)\.(\d+)$", text, re.MULTILINE)
          if not match:
              raise SystemExit("gradle.properties must contain mod_version=YEAR.MONTH.CURRENT_BUILD")

          now = datetime.now(timezone.utc)
          year = int(str(now.year)[-2:])
          month = now.month
          current_year, current_month, current_build = map(int, match.groups())
          next_build = current_build + 1 if (current_year, current_month) == (year, month) else 1
          version = f"{year}.{month}.{next_build}"
          release_branch = f"release/{version}"

          updated = re.sub(
              r"^mod_version=.*$",
              f"mod_version={version}",
              text,
              count=1,
              flags=re.MULTILINE,
          )
          path.write_text(updated, encoding="utf-8")

          print(f"version={version}")
          print(f"release_branch={release_branch}")
          PY

      - name: Commit version bump
        run: |
          git add gradle.properties
          git commit -m "Bump version to ${{ steps.version.outputs.version }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Create release branch
        run: |
          git switch -c "${{ steps.version.outputs.release_branch }}"
          git push origin "${{ steps.version.outputs.release_branch }}"

  publish:
    name: Build and publish ${{ needs.prepare_release.outputs.version }}
    needs: prepare_release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.release_branch }}
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Generate changelog
        env:
          VERSION: ${{ needs.prepare_release.outputs.version }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import subprocess

          version = os.environ["VERSION"]

          def git(*args):
              return subprocess.check_output(("git", *args), text=True).strip()

          tags = [
              tag for tag in git("tag", "--list", "[0-9]*.[0-9]*.[0-9]*", "--sort=-version:refname").splitlines()
              if tag != version
          ]
          previous_tag = tags[0] if tags else ""
          revision_range = f"{previous_tag}..HEAD" if previous_tag else "HEAD"

          log_format = "%s"
          subjects = git("log", revision_range, f"--pretty=format:{log_format}", "--no-merges").splitlines()
          subjects = [
              subject for subject in subjects
              if subject and subject != f"Bump version to {version}"
          ]

          lines = [f"AutoConnect {version}"]
          if previous_tag:
              lines.append(f"Changes since {previous_tag}:")
          else:
              lines.append("Changes:")

          if subjects:
              lines.extend(f"- {subject}" for subject in subjects)
          else:
              lines.append("- Maintenance release.")

          Path("build").mkdir(exist_ok=True)
          Path("build/publish-changelog.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Build publish artifacts
        run: gradle preparePublishArtifacts --no-daemon --console=plain

      - name: Publish GitHub release
        if: ${{ inputs.publish_github_release }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: ${{ needs.prepare_release.outputs.version }}
          github-commitish: ${{ needs.prepare_release.outputs.release_branch }}
          github-draft: false
          github-prerelease: ${{ inputs.release_type != 'release' }}
          files: publish/*.jar
          name: AutoConnect ${{ needs.prepare_release.outputs.version }}
          version: ${{ needs.prepare_release.outputs.version }}
          version-type: ${{ inputs.release_type }}
          changelog-file: build/publish-changelog.md
          retry-attempts: 3

      - name: Publish Modrinth artifacts
        if: ${{ inputs.publish_modrinth }}
        env:
          VERSION: ${{ needs.prepare_release.outputs.version }}
          RELEASE_TYPE: ${{ inputs.release_type }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: python .github/scripts/publish_modrinth.py

      - name: Publish CurseForge artifacts
        if: ${{ inputs.publish_curseforge }}
        env:
          VERSION: ${{ needs.prepare_release.outputs.version }}
          RELEASE_TYPE: ${{ inputs.release_type }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: python .github/scripts/publish_curseforge.py
